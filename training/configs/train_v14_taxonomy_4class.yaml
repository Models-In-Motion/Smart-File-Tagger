data:
  path: data/artifacts/versions/v14_taxonomy_4class/train.parquet
  eval_path: data/artifacts/versions/v14_taxonomy_4class/eval.parquet
  text_col: extracted_text
  label_col: label
  allowed_labels:
  - Lecture Notes
  - Problem Set
  - Exam
  - Other
split:
  train_size: 0.7
  val_size: 0.15
  test_size: 0.15
  random_state: 42
  val_from_eval_size: 0.5
mlflow:
  experiment_name: nextcloud-doc-tagger-training
  tracking_uri: http://mlflow:5000
models:
  tfidf:
    max_features: 50000
    ngram_range:
    - 1
    - 3
    min_df: 1
    max_df: 0.95
  logreg:
    max_iter: 1000
    c: 1.0
    solver: lbfgs
    multi_class: auto
    class_weight: balanced
  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1
    min_child_samples: 5
  mlp:
    hidden_layer_sizes:
    - 256
    - 64
    activation: relu
    learning_rate_init: 0.001
    max_iter: 200
    random_state: 42
