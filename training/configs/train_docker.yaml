data:
  # Feedback-enriched train set produced by retrain_trigger.py → batch_pipeline.py.
  # Falls back to Run B base if the enriched file hasn't been generated yet.
  path: /app/testing_results/parquet/run_b_train_with_feedback.parquet
  fallback_path: /app/testing_results/parquet/run_b_train_llm_merged_ops.parquet
  eval_path: /app/testing_results/parquet/run_b_eval_llm_merged_ops.parquet
  text_col: extracted_text
  label_col: llm_label_merged
  allowed_labels:
    - Lecture Notes
    - Other
    - Problem Set
    - Exam
    - Reading

split:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  random_state: 42
  val_from_eval_size: 0.5

mlflow:
  experiment_name: nextcloud-doc-tagger-training
  tracking_uri: http://mlflow:5000

models:
  tfidf:
    max_features: 20000
    ngram_range: [1, 2]
    min_df: 1
    max_df: 0.95

  logreg:
    max_iter: 1000
    c: 1.0
    solver: lbfgs

  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  sbert:
    model_name: all-MiniLM-L6-v2
    device: cpu
    batch_size: 32
    normalize_embeddings: true

  mlp:
    hidden_layer_sizes: [256, 64]
    activation: relu
    learning_rate_init: 0.001
    max_iter: 200
    random_state: 42
