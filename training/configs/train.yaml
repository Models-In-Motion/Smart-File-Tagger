data:
  # Local path (running from training/ folder directly)
  # On Chameleon via Docker, this is overridden by the volume mount
  path: ../data/artifacts/versions/v2/train.parquet
  text_col: extracted_text
  label_col: label
  allowed_labels:
    - Lecture Notes
    - Other
    - Problem Set
    - Exam
    - Project
    - Reading
    - Solution

split:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  random_state: 42

mlflow:
  experiment_name: nextcloud-doc-tagger-training
  # In-container / Chameleon (Docker DNS). compose also sets MLFLOW_TRACKING_URI (takes precedence in train.py).
  # On your laptop without Docker: export MLFLOW_TRACKING_URI=file:$(pwd)/mlruns
  #   or http://127.0.0.1:5001 if compose maps MLflow (see docker-compose mlflow ports).
  tracking_uri: http://mlflow:5000

models:
  tfidf:
    max_features: 20000
    ngram_range: [1, 2]
    min_df: 1
    max_df: 0.95

  logreg:
    max_iter: 1000
    c: 1.0
    solver: lbfgs
    multi_class: auto

  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  mlp:
    hidden_layer_sizes: [256, 64]
    activation: relu
    learning_rate_init: 0.001
    max_iter: 200
    random_state: 42
