data:
  path: data/ocw_subset_200.parquet
  text_col: text
  label_col: doc_type
  allowed_labels:
    - Lecture Notes
    - Lecture Transcript
    - Problem Set
    - Exam
    - Reading / Reference

split:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  random_state: 42

mlflow:
  experiment_name: nextcloud-doc-tagger-training
  tracking_uri: http://127.0.0.1:5000

models:
  tfidf:
    max_features: 20000
    ngram_range: [1, 2]
    min_df: 1
    max_df: 0.95

  sbert:
    model_name: sentence-transformers/all-MiniLM-L6-v2
    device: cpu
    batch_size: 32
    normalize_embeddings: true

  logreg:
    max_iter: 1000
    c: 1.0
    solver: lbfgs
    multi_class: auto

  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  mlp:
    hidden_layer_sizes: [256, 64]
    activation: relu
    learning_rate_init: 0.001
    max_iter: 200
    random_state: 42
