model_name: answerdotai/ModernBERT-base
script: scripts/transformer_finetune.py
data:
  path: /app/data_artifacts/versions/v6/train_llm_run_c.parquet
  eval_path: /app/data_artifacts/versions/v6/eval_llm_run_c.parquet
  text_col: extracted_text
  label_col: llm_label_run_c
  allowed_labels: [Lecture Notes, Other, Problem Set, Reading]
training:
  epochs: 1
  batch_size: 4
  max_length: 192
  learning_rate: 1e-5
  max_train_rows: 2000
  seed: 42
split:
  val_from_eval_size: 0.5
